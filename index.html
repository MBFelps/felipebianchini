    const blobUrls = {};

      const entry = manifest[uuid];

    // would push the parser into quirks mode. DOMParser always emits a <head>

-ext */\n@font-face {\n  font-family: 'Schibsted Grotesk';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"ba372313-4499-4009-b94e-476fbd29f176\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Schibsted Grotesk';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"8654b951-d174-4377-ac1f-0328cbd59aa5\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'Schibsted Grotesk';\n  font-style: normal;\n  font-weight: 800;\n  font-display: swap;\n  src: url(\"ba372313-4499-4009-b94e-476fbd29f176\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Schibsted Grotesk';\n  font-style: normal;\n  font-weight: 800;\n  font-display: swap;\n  src: url(\"8654b951-d174-4377-ac1f-0328cbd59aa5\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<style>\n  *{box-sizing:border-box;}\n  html,body{margin:0;padding:0;}\n  ::selection{background:#f1cdbd;color:#14202e;}\n  @media (min-width:700px){\n    .fb-hdr{flex-direction:row-reverse !important;justify-content:space-between !important;align-items:center !important;text-align:left !important;}\n    .fb-hdr .fb-hdr-text{text-align:left !important;}\n  }\n<\u002Fstyle>\n<\u002Fhelmet>\n\n<div data-screen-label=\"Profile\" style=\"background:#f6f3ee;color:#14202e;font-family:'Hanken Grotesk',system-ui,-apple-system,sans-serif;-webkit-font-smoothing:antialiased;min-height:100%;line-height:1.5;\">\n  <div style=\"max-width:780px;margin:0 auto;padding:clamp(32px,6vw,68px) clamp(22px,6vw,48px) clamp(40px,7vw,76px);\">\n\n    <!-- ===================== HEADER ===================== -->\n    <header class=\"fb-hdr\" style=\"display:flex;flex-direction:column;align-items:center;text-align:center;gap:clamp(26px,5vw,44px);\">\n      <div style=\"flex:0 0 auto;width:clamp(150px,32vw,200px);aspect-ratio:1;border-radius:50%;overflow:hidden;box-shadow:0 0 0 1px #e6dfd2, 0 14px 34px rgba(20,30,45,.14);background:#ece5d8;\">\n        <img src=\"Felipe.png\" alt=\"Felipe Bianchini\" style=\"width:100%;height:100%;object-fit:cover;display:block;\">\n      <\u002Fdiv>\n      <div class=\"fb-hdr-text\" style=\"text-align:center;\">\n        <h1 style=\"margin:0;font-family:'Schibsted Grotesk',sans-serif;font-weight:800;font-size:clamp(40px,8.4vw,68px);line-height:1.0;letter-spacing:-0.025em;color:#14202e;\">Felipe Bianchini<\u002Fh1>\n        <p style=\"margin:clamp(12px,2vw,18px) 0 0;font-family:'Hanken Grotesk',sans-serif;font-weight:600;font-size:clamp(16px,2.6vw,21px);letter-spacing:0.01em;color:#bd5a36;\">Marketing Operator<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fheader>\n\n    <!-- ===================== MY STORY ===================== -->\n    <section style=\"margin-top:clamp(44px,8vw,80px);\">\n      <div style=\"display:flex;align-items:center;gap:13px;margin-bottom:clamp(14px,2.5vw,22px);\">\n        <span style=\"width:30px;height:2px;background:#bd5a36;\"><\u002Fspan>\n        <span style=\"font-family:'Hanken Grotesk',sans-serif;font-weight:700;font-size:13px;text-transform:uppercase;letter-spacing:0.16em;color:#a8492a;\">My Story<\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"background:#fffdf9;border:1px solid #ece4d4;border-radius:18px;padding:clamp(26px,5vw,52px);box-shadow:0 1px 2px rgba(20,30,45,.04),0 20px 44px -28px rgba(20,30,45,.18);\">\n        <p style=\"margin:0;font-size:clamp(19px,2.6vw,23px);line-height:1.72;font-weight:500;color:#0e1820;\">I did not start in marketing. I spent years in finance and trading. I was good at it, but it felt hollow, like I was trading hours for money and nothing more.<\u002Fp>\n        <p style=\"margin:clamp(18px,2.6vw,26px) 0 0;font-size:clamp(17px,2.3vw,20px);line-height:1.78;color:#1c2b38;\">What changed me was getting burned. I bought online courses that promised the world and delivered very little. I felt tricked. For a while I assumed that was just how marketing worked: exaggerate, push, sell. So I wanted nothing to do with it.<\u002Fp>\n        <p style=\"margin:clamp(18px,2.6vw,26px) 0 0;font-size:clamp(17px,2.3vw,20px);line-height:1.78;color:#1c2b38;\">Then I learned I was wrong. <strong style=\"color:#14202e;font-weight:700;\">Marketing does not have to manipulate.<\u002Fstrong> Done right, it carries a real message and helps the right people find something that actually helps them. That changed everything for me, and I decided I would do this my way.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- ===================== WHAT TO EXPECT ===================== -->\n    <section style=\"margin-top:clamp(44px,8vw,80px);\">\n      <div style=\"display:flex;align-items:center;gap:13px;margin-bottom:clamp(8px,1.5vw,14px);\">\n        <span style=\"width:30px;height:2px;background:#bd5a36;\"><\u002Fspan>\n        <span style=\"font-family:'Hanken Grotesk',sans-serif;font-weight:700;font-size:13px;text-transform:uppercase;letter-spacing:0.16em;color:#a8492a;\">What To Expect<\u002Fspan>\n      <\u002Fdiv>\n      <p style=\"margin:0 0 clamp(8px,1.5vw,14px);font-size:clamp(15px,2vw,17px);color:#50606e;\">Here is how the work gets done.<\u002Fp>\n      <div style=\"display:flex;flex-direction:column;border-bottom:1px solid #e3dccc;\">\n        <div style=\"display:flex;gap:clamp(16px,3vw,30px);align-items:baseline;padding:clamp(16px,2.8vw,24px) 0;border-top:1px solid #e3dccc;\">\n          <span style=\"flex:0 0 auto;width:1.7em;font-family:'Schibsted Grotesk',sans-serif;font-weight:700;font-size:14px;letter-spacing:0.04em;color:#bd5a36;\">01<\u002Fspan>\n          <p style=\"margin:0;font-size:clamp(18px,2.5vw,22px);line-height:1.5;font-weight:600;color:#16202c;\">Good work is a win for both sides. <span style=\"font-weight:500;color:#49596a;\">That is the only kind worth doing.<\u002Fspan><\u002Fp>\n        <\u002Fdiv>\n        <div style=\"display:flex;gap:clamp(16px,3vw,30px);align-items:baseline;padding:clamp(16px,2.8vw,24px) 0;border-top:1px solid #e3dccc;\">\n          <span style=\"flex:0 0 auto;width:1.7em;font-family:'Schibsted Grotesk',sans-serif;font-weight:700;font-size:14px;letter-spacing:0.04em;color:#bd5a36;\">02<\u002Fspan>\n          <p style=\"margin:0;font-size:clamp(18px,2.5vw,22px);line-height:1.5;font-weight:600;color:#16202c;\">It starts with belief. <span style=\"font-weight:500;color:#49596a;\">The work has to be something worth standing behind.<\u002Fspan><\u002Fp>\n        <\u002Fdiv>\n        <div style=\"display:flex;gap:clamp(16px,3vw,30px);align-items:baseline;padding:clamp(16px,2.8vw,24px) 0;border-top:1px solid #e3dccc;\">\n          <span style=\"flex:0 0 auto;width:1.7em;font-family:'Schibsted Grotesk',sans-serif;font-weight:700;font-size:14px;letter-spacing:0.04em;color:#bd5a36;\">03<\u002Fspan>\n          <p style=\"margin:0;font-size:clamp(18px,2.5vw,22px);line-height:1.5;font-weight:600;color:#16202c;\">A commitment is a commitment. <span style=\"font-weight:500;color:#49596a;\">What is promised gets delivered. More is possible, less is not.<\u002Fspan><\u002Fp>\n        <\u002Fdiv>\n        <div style=\"display:flex;gap:clamp(16px,3vw,30px);align-items:baseline;padding:clamp(16px,2.8vw,24px) 0;border-top:1px solid #e3dccc;\">\n          <span style=\"flex:0 0 auto;width:1.7em;font-family:'Schibsted Grotesk',sans-serif;font-weight:700;font-size:14px;letter-spacing:0.04em;color:#bd5a36;\">04<\u002Fspan>\n          <p style=\"margin:0;font-size:clamp(18px,2.5vw,22px);line-height:1.5;font-weight:600;color:#16202c;\">No promise is made that cannot be kept. <span style=\"font-weight:500;color:#49596a;\">When the word is given, it is owned.<\u002Fspan><\u002Fp>\n        <\u002Fdiv>\n        <div style=\"display:flex;gap:clamp(16px,3vw,30px);align-items:baseline;padding:clamp(16px,2.8vw,24px) 0;border-top:1px solid #e3dccc;\">\n          <span style=\"flex:0 0 auto;width:1.7em;font-family:'Schibsted Grotesk',sans-serif;font-weight:700;font-size:14px;letter-spacing:0.04em;color:#bd5a36;\">05<\u002Fspan>\n          <p style=\"margin:0;font-size:clamp(18px,2.5vw,22px);line-height:1.5;font-weight:600;color:#16202c;\">The details get handled. <span style=\"font-weight:500;color:#49596a;\">The work holds up. What was agreed is what you get.<\u002Fspan><\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- ===================== WHAT I DO ===================== -->\n    <section style=\"margin-top:clamp(44px,8vw,80px);\">\n      <div style=\"display:flex;align-items:center;gap:13px;margin-bottom:clamp(6px,1.5vw,12px);\">\n        <span style=\"width:30px;height:2px;background:#bd5a36;\"><\u002Fspan>\n        <span style=\"font-family:'Hanken Grotesk',sans-serif;font-weight:700;font-size:13px;text-transform:uppercase;letter-spacing:0.16em;color:#a8492a;\">What I Do<\u002Fspan>\n      <\u002Fdiv>\n      <p style=\"margin:0 0 clamp(20px,3vw,28px);font-size:clamp(15px,2vw,17px);color:#50606e;\">I run marketing and operations for remote teams. The real work:<\u002Fp>\n\n      <!-- Standout: revenue -->\n      <div style=\"background:#14202e;border-radius:18px;padding:clamp(24px,4.5vw,40px);color:#fff;display:flex;flex-wrap:wrap;align-items:center;gap:22px 36px;justify-content:space-between;box-shadow:0 22px 50px -26px rgba(20,30,45,.55);\">\n        <div style=\"flex:1 1 250px;min-width:0;\">\n          <div style=\"font-family:'Schibsted Grotesk',sans-serif;font-weight:800;font-size:clamp(40px,8vw,62px);line-height:1.0;letter-spacing:-0.02em;display:flex;align-items:center;gap:0.18em;flex-wrap:wrap;\">\n            <span style=\"color:#8493a3;\">2k<\u002Fspan>\n            <span style=\"color:#e07a4f;\">→<\u002Fspan>\n            <span style=\"color:#ffffff;\">15k<\u002Fspan>\n          <\u002Fdiv>\n          <p style=\"margin:16px 0 0;font-size:clamp(15px,2.2vw,18px);line-height:1.55;color:#bcc6d1;font-weight:500;\">Grew a venue’s average monthly revenue, from around 2k to around 15k.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"flex:0 0 auto;background:rgba(224,122,79,.16);border:1px solid rgba(224,122,79,.55);color:#f0a884;border-radius:999px;padding:11px 18px;font-weight:700;font-size:clamp(13px,1.8vw,15px);letter-spacing:0.01em;white-space:nowrap;\">Record month above 25k<\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- Other results -->\n      <div style=\"display:flex;flex-direction:column;margin-top:8px;\">\n        <div style=\"display:flex;gap:18px;align-items:flex-start;padding:clamp(14px,2.4vw,20px) 0;border-bottom:1px solid #e3dccc;\">\n          <span style=\"flex:0 0 auto;margin-top:0.55em;width:9px;height:9px;border-radius:50%;background:#bd5a36;\"><\u002Fspan>\n          <p style=\"margin:0;font-size:clamp(17px,2.3vw,20px);line-height:1.55;color:#14202e;font-weight:500;\"><strong style=\"font-weight:700;color:#0e1820;\">Doubled a client’s incoming leads<\u002Fstrong> by rebuilding their lead capture page.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"display:flex;gap:18px;align-items:flex-start;padding:clamp(14px,2.4vw,20px) 0;border-bottom:1px solid #e3dccc;\">\n          <span style=\"flex:0 0 auto;margin-top:0.55em;width:9px;height:9px;border-radius:50%;background:#bd5a36;\"><\u002Fspan>\n          <p style=\"margin:0;font-size:cla
